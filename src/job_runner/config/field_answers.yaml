# Default label-pattern → answer hints for application forms.
# Match is case-insensitive regex against field label / placeholder / name context.
# Override or extend in ~/.job_runner/field_answers.yaml (same `rules:` shape).

rules:
  - pattern: "previously worked at|ever worked (for|at)|worked here before|prior employee"
    answer: "No"
  - pattern: "currently (employed|work)|work for .+ as an employee"
    answer: "No"
  - pattern: "family|relative|friend.*work"
    answer: "No"
  - pattern: "referred by|who referred|employee referral"
    answer: "No"
  - pattern: "require.*sponsorship|visa sponsorship|h1-?b"
    answer: "No"
  - pattern: "legally authorized|eligible to work|permit.*work in"
    answer: "Yes"
  - pattern: "felony|convicted of a crime"
    answer: "No"
  - pattern: "background check"
    answer: "Yes"
  - pattern: "drug test"
    answer: "Yes"
  - pattern: "18 years|age 18|of age"
    answer: "Yes"
  # More specific patterns first (generic "how did you hear|source of" would win otherwise).
  - pattern: "how did you hear about us|where did you hear about us"
    answer: "LinkedIn"
    note: Override in profile personal.application_source if needed
  - pattern: "how did you hear|source of"
    answer: "Online Job Board"
  - pattern: "willing to relocate|relocation required|relocate if the role"
    answer: "Yes"
    note: Override via profile availability.willing_to_relocate
  - pattern: "country of residence|country/region|^country$"
    answer: "United States"
    note: Prefer personal.country in profile — match_answer_for_field overrides this
  - pattern: "phone country|calling code|country code|international dial|idd"
    answer: "United States (+1)"
    note: Prefer personal.phone_country_code — must match ATS option text (e.g. +1 or full label)
  # SMS / text consent (label often includes company name: "Can Acme text you about…")
  - pattern: "text you about (your )?application|sms.*application|receive.*text.*(message|update)|may we text|send you.*text"
    answer: "Yes"
    note: SMS updates about application — choose Yes / opt in
  - pattern: "phone.*(call|contact).*(about )?your application|reach you by phone.*application"
    answer: "Yes"
    note: Phone contact about application — Yes unless you prefer email only
