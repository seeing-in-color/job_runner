# Job Runner search configuration
# Copy to ~/.job_runner/searches.yaml and customize for your job search.
# The wizard (job_runner init) generates a basic version automatically.

# Search queries -- each has a query string and priority tier.
# Tier 1: High-priority exact matches (searched first, highest precision)
# Tier 2: Strong matches, broader scope
# Tier 3: Wide net, high volume, lower precision
queries:
  - query: "Solutions Consultant"
    tier: 1
  - query: "Solutions Engineer"
    tier: 1
  - query: "Sales Engineer"
    tier: 1

# Locations to search
locations:
  - location: "Austin, TX"
    remote: false
  - location: "Remote"
    remote: true

# Location filtering -- accept/reject patterns for job location text
location:
  accept_patterns:
    - "Austin"
    - "TX"
    - "Texas"
    - "Remote"
    - "Anywhere"
    - "United States"
    - "US"
    - "USA"
  reject_patterns:
    - "New York only"
    - "Seattle only"
    - "onsite only"
    - "London, UK"
    - "India"
    - "Philippines"
    - "EMEA only"
    - "APAC only"
    - "Canada only"

# Country for Indeed/LinkedIn/Google Jobs searches
country: "USA"

# JobSpy source boards (all available options shown)
boards:
  - indeed
  - linkedin
  - glassdoor
  - zip_recruiter
  - google

# Search defaults
defaults:
  results_per_site: 200   # Max results per board per query
  hours_old: 96          # Only jobs posted within this many hours
  # JobSpy: scope Indeed/Glassdoor + US-remote hint (see country: above)
  country_indeed: usa
  # For remote: true rows, JobSpy uses "United States" + is_remote (US-only remote).
  # To use the literal "Remote" string instead: set remote_location_string: "Remote"

# Negative keywords -- skip jobs with these in the title (case-insensitive)
exclude_titles:
  - "software engineer"
  - "backend engineer"
  - "full stack"
  - "frontend engineer"
  - "mobile engineer"
  - "data scientist"
  - "machine learning engineer"
  - "SRE"
  - "devops engineer"
  - "senior director"
  - "VP "
  - "vice president"
  - "chief"
  - "intern"
  - "internship"
  - "co-op"
  - "clearance required"
  - "TS/SCI"
  - "principal scientist"
